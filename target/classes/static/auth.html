<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - TruthAI</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .auth-form {
            transition: all 0.5s ease;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--lavender);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .auth-toggle {
            margin-top: 25px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-toggle a {
            color: var(--neon-purple);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .hidden-form {
            display: none;
            opacity: 0;
            transform: translateX(50px);
        }

        .visible-form {
            display: block;
            opacity: 1;
            transform: translateX(0);
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--lavender);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-home:hover {
            color: var(--neon-purple);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <a href="index.html" class="back-home">
        <span>←</span> Back to Home
    </a>

    <div class="auth-container-wrapper">
        <div class="auth-card glass-card">
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form visible-form">
                <h2 class="section-title" style="margin-bottom: 20px;">Welcome Back</h2>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Login to access saved reports and analytics.</p>
                
                <form onsubmit="return handleAuth(event, 'login')">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-gradient shine-effect">
                        <span class="btn-text">Sign In</span>
                    </button>
                </form>

                <div class="auth-toggle">
                    Don't have an account? <a onclick="toggleForms()">Create Account</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form hidden-form">
                <h2 class="section-title" style="margin-bottom: 20px;">Join TruthAI</h2>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Start tracking news credibility with your own dashboard.</p>
                
                <form onsubmit="return handleAuth(event, 'signup')">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-gradient shine-effect">
                        <span class="btn-text">Register Now</span>
                    </button>
                </form>

                <div class="auth-toggle">
                    Already have an account? <a onclick="toggleForms()">Sign In</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleForms() {
            const login = document.getElementById('loginForm');
            const signup = document.getElementById('signupForm');
            
            if (login.classList.contains('visible-form')) {
                login.classList.remove('visible-form');
                login.classList.add('hidden-form');
                signup.classList.remove('hidden-form');
                signup.classList.add('visible-form');
            } else {
                signup.classList.remove('visible-form');
                signup.classList.add('hidden-form');
                login.classList.remove('hidden-form');
                login.classList.add('visible-form');
            }
        }

        function handleAuth(event, type) {
            event.preventDefault();
            const btn = event.target.querySelector('button');
            const btnText = btn.querySelector('.btn-text');
            
            // Show loading state
            btnText.innerHTML = type === 'login' ? 'Signing in...' : 'Registering...';
            btn.disabled = true;

            // Mock interaction delay
            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                alert(type === 'login' ? 'Success! Redirecting to Dashboard...' : 'Account Created Successfully!');
                window.location.href = 'index.html';
            }, 1500);

            return false;
        }
    </script>
</body>
</html>
